name: Build Executables

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller --onefile --windowed --name "IML Lab Accession" --add-data "database/schema.sql;database" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IML-Lab-Accession-Windows
          path: dist/
    
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller --onefile --windowed --name "IML Lab Accession" --add-data "database/schema.sql:database" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IML-Lab-Accession-Mac
          path: dist/